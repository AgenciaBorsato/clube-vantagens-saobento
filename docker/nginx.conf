worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Logs
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    server {
        listen 8080;
        server_name _;
        root /var/www/html;
        index index.html index.php;

        # Ocultar versao do Nginx
        server_tokens off;

        # Arquivos estaticos com cache
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # API PHP
        location ~ ^/api/.*\.php$ {
            fastcgi_pass unix:/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 30;

            # Prevenir acesso direto a arquivos PHP via path traversal
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Includes PHP (bloquear acesso direto)
        location ~ ^/includes/ {
            deny all;
            return 403;
        }

        # Bloquear acesso a arquivos sensiveis
        location ~ /\. {
            deny all;
        }
        location ~ /(composer\.json|database\.sql|Dockerfile|Procfile|nixpacks\.toml|README\.md)$ {
            deny all;
        }
        location ~ /docker/ {
            deny all;
        }

        # Fallback para SPA
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
